<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Pong Game</title>
    <link rel="stylesheet" href="styles-contact.css">
</head>
<body>
    <div class="container">
        <!-- ENCABEZADO -->
        <div class="header">
            <h1>📧 Formulario de Contacto</h1>
            <p class="subtitle">¿Tienes preguntas? ¡Contáctanos!</p>
        </div>

        <!-- FORMULARIO DE CONTACTO -->
        <div class="contact-form-container">
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Nombre Completo:</label>
                    <input type="text" id="name" name="name" required placeholder="Tu nombre completo">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="subject">Asunto:</label>
                    <input type="text" id="subject" name="subject" required placeholder="Asunto del mensaje">
                </div>

                <div class="form-group">
                    <label for="message">Mensaje:</label>
                    <textarea id="message" name="message" required placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Mensaje</button>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>

        <!-- ENLACE DE REGRESO -->
        <div class="back-link">
            <a href="pong.html">← Volver al Juego</a>
        </div>
    </div>

    <script src="script-contact.js"></script>
</body>
</html>
